name: snakemake_bridge
description: >-
  Embed a real-time Snakemake workflow monitor in a Dart desktop app:
  WebSocket server, typed event models, state reducer and process launcher.
version: 0.1.0
repository: https://github.com/karlaycosta/snakemake-dart
issue_tracker: https://github.com/karlaycosta/snakemake-dart/issues

environment:
  sdk: ^3.12.2

dependencies:
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.2
